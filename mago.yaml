# Welcome to Mago!
# yaml-language-server: $schema=./mago.schema.json
# For full documentation, see https://mago.carthage.software/tools/overview
php-version: "8.5.0"

source:
  paths:
    - "src/"
    - "tests/"
  includes:
    - "vendor"
  excludes:
    - "./vendor/symfony/cache/Traits/ValueWrapper.php"
    - "./vendor/composer"
    - "./tests"

formatter:
  print-width: 120
  tab-width: 4
  use-tabs: false
  null-type-hint: "Question"

linter:
  integrations:
    - "phpunit"
  rules:
    yoda-conditions:
      enabled: false
    literal-named-argument:
      enabled: false
    halstead:
      effort-threshold: 7000
    interface-name:
      enabled: false
    trait-name:
      enabled: false

analyzer:
  excludes:
    - "./tests"
  find-unused-definitions: true
  find-unused-expressions: false
  analyze-dead-code: false
  check-throws: false
  allow-possibly-undefined-array-keys: true
  perform-heuristic-checks: false
